<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#221C35"/>
      <stop offset="100%" stop-color="#0E0C18"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#FF3E8A" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#FF3E8A" stop-opacity="0"/>
    </radialGradient>
    <filter id="starglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="160" fill="url(#glow)"/>

  <rect x="52" y="52" width="408" height="408" rx="72" ry="72"
        fill="none" stroke="#FF3E8A" stroke-width="18" stroke-opacity=".22"/>
  <rect x="104" y="104" width="304" height="304" rx="52" ry="52"
        fill="none" stroke="#FF3E8A" stroke-width="14" stroke-opacity=".45"/>
  <rect x="160" y="160" width="192" height="192" rx="34" ry="34"
        fill="none" stroke="#FF3E8A" stroke-width="11" stroke-opacity=".85"/>
  <rect x="196" y="196" width="120" height="120" rx="20" ry="20"
        fill="#FF3E8A" fill-opacity=".07"/>

  <g filter="url(#starglow)" transform="translate(256,256)">
    <ellipse cx="0" cy="0" rx="36" ry="7" fill="#fff" fill-opacity=".95"/>
    <ellipse cx="0" cy="0" rx="7" ry="36" fill="#fff" fill-opacity=".95"/>
    <ellipse cx="0" cy="0" rx="20" ry="4.5" fill="#FFB3D1" fill-opacity=".6" transform="rotate(45)"/>
    <ellipse cx="0" cy="0" rx="4.5" ry="20" fill="#FFB3D1" fill-opacity=".6" transform="rotate(45)"/>
    <circle cx="0" cy="0" r="10" fill="#FF3E8A"/>
    <circle cx="0" cy="0" r="5" fill="#fff"/>
  </g>

  <circle cx="256" cy="104" r="4" fill="#FF3E8A" fill-opacity=".5"/>
  <circle cx="256" cy="408" r="4" fill="#FF3E8A" fill-opacity=".5"/>
  <circle cx="104" cy="256" r="4" fill="#FF3E8A" fill-opacity=".5"/>
  <circle cx="408" cy="256" r="4" fill="#FF3E8A" fill-opacity=".5"/>
</svg>
